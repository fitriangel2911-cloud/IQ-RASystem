# Konfigurasi SonarQube / SonarCloud untuk IQ-RA System
sonar.projectKey=fitriangel2911-cloud_IQ-RASystem
sonar.organization=fitriangel2911-cloud
sonar.projectName=IQ-RA System
sonar.projectVersion=1.0.0

# Jalur pencarian kode sumber (sources) dan pengujian (tests)
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# File atau folder yang harus diabaikan dari pemindaian
sonar.exclusions=node_modules/**, .next/**, out/**, public/**, docs/**, supabase/**, test-db.js, inspect-db.js, scratch/**, scripts/**, **/temp_*.*, **/*.bat, **/*.ps1, *.js, *.sql

# Encoding file sumber
sonar.sourceEncoding=UTF-8

# Konfigurasi Lcov Report (jika menggunakan testing framework lokal di masa mendatang)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
